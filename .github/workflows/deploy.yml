name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Refresh Cloudflare token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST "https://dash.cloudflare.com/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=refresh_token&refresh_token=${{ secrets.CF_REFRESH_TOKEN }}&client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")
          echo "access_token=$(echo $RESPONSE | python3 -c 'import sys,json; print(json.load(sys.stdin).get("access_token",""))')" >> $GITHUB_OUTPUT
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.token.outputs.access_token }}
          CLOUDFLARE_ACCOUNT_ID: 451bf92bee76388ee07fb9a4a505dc73
        run: npx wrangler pages deploy dist --project-name=kokaj-abschleppdienst --branch=main
